pre-commit:
  parallel: false
  commands:
    biome-format:
      glob: "packages/**/*.{ts,tsx,js,jsx,json}"
      run: pnpm exec biome format --write {staged_files}
      stage_fixed: true
    agent-rules:
      run: pnpm guard:agent-rules {staged_files}
    function-params:
      run: pnpm guard:function-params {staged_files}
    ui-contract:
      run: pnpm guard:ui-contract {staged_files}
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck:client
