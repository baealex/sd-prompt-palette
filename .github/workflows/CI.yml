name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/CI.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/CI.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [21.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Dependencies
      run: npx pnpm i
    
    - name: Lint (Server)
      run: npx pnpm --filter @ocean-palette/server run lint
    
    - name: Test (Server)
      run: npx pnpm --filter @ocean-palette/server run test
    
    - name: Build (Server)
      run: npx pnpm --filter @ocean-palette/server run build

    - name: Lint (Client React)
      run: npx pnpm --filter @ocean-palette/client run lint

    - name: Typecheck (Client React)
      run: npx pnpm --filter @ocean-palette/client run typecheck

    - name: React Compiler Healthcheck (Client React)
      run: npx pnpm --filter @ocean-palette/client run react-compiler:check

    - name: Test (Client React)
      run: npx pnpm --filter @ocean-palette/client run test

    - name: Build (Client React)
      run: npx pnpm --filter @ocean-palette/client run build
